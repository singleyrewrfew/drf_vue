<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/backend.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS 后台管理系统</title>
    <!-- Premium 字体：Inter (Latin) + Noto Sans SC (CJK) -->
    <!-- 使用国内镜像加速，避免 Google Fonts 访问问题 -->
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('admin-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
          document.documentElement.style.backgroundColor = '#1A1A1A';
        }
      })();
    </script>
    <style>
      html { background-color: #F3F3F4; }
      html[data-theme="dark"] { background-color: #1A1A1A; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
