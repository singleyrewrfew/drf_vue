name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # 前端构建测试
  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          frontend/node_modules
          mobile/node_modules
          front/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json', 'mobile/package-lock.json', 'front/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install dependencies (Frontend PC)
      working-directory: ./frontend
      run: npm ci
    
    - name: Build frontend (PC)
      working-directory: ./frontend
      run: npm run build
    
    - name: Install dependencies (Mobile)
      working-directory: ./mobile
      run: npm ci
    
    - name: Build frontend (Mobile)
      working-directory: ./mobile
      run: npm run build
    
    - name: Install dependencies (Backend Admin)
      working-directory: ./front
      run: npm ci
    
    - name: Build backend admin interface
      working-directory: ./front
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-builds
        path: |
          frontend/dist_backend/
          mobile/dist_mobile/
          front/dist/
        retention-days: 7

  # 部署（仅在主分支推送时执行）
  deploy:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-builds
    
    - name: Deploy notification
      run: |
        echo "🚀 Starting deployment..."
        echo "Commit: ${{ github.sha }}"
        echo "Author: ${{ github.actor }}"
        echo "Branch: ${{ github.ref_name }}"
