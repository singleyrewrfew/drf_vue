name: Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - '.github/*.service'
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT }}
  BACKEND_PATH: /home/DRF_VUE/drf_vue/backend
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -p ${{ env.SERVER_PORT }} ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy backend to server
      run: |
        # 上传后端代码到服务器
        rsync -avz --delete \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='htmlcov' \
          --exclude='.coverage' \
          --exclude='venv' \
          --exclude='.env.development' \
          --exclude='media' \
          --exclude='staticfiles' \
          --exclude='logs' \
          backend/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/
        
        # 上传 systemd service 文件
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ${{ env.BACKEND_PATH }}/.github"
        scp -P ${{ env.SERVER_PORT }} .github/gunicorn.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        scp -P ${{ env.SERVER_PORT }} .github/celery-worker.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        scp -P ${{ env.SERVER_PORT }} .github/celery-beat.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        
        # 在服务器上执行部署命令
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
          cd /home/DRF_VUE/drf_vue/backend
          
          # 设置生产环境变量
          export DJANGO_ENV=production
          
          # 检查并更新 systemd service 文件（仅在变化时）
          SERVICES_CHANGED=false
          for service in gunicorn.service celery-worker.service celery-beat.service; do
            if [ -f ".github/$service" ]; then
              if ! cmp -s ".github/$service" "/etc/systemd/system/drf_vue_${service%.service}.service" 2>/dev/null; then
                sudo cp ".github/$service" "/etc/systemd/system/drf_vue_${service%.service}.service"
                SERVICES_CHANGED=true
                echo "Updated: $service"
              fi
            fi
          done
          
          if [ "$SERVICES_CHANGED" = true ]; then
            sudo systemctl daemon-reload
            echo "Systemd services updated"
          fi
          
          # 检查虚拟环境是否存在
          if [ ! -d "venv" ]; then
            echo "Creating virtual environment..."
            python3.11 -m venv venv
          fi
          
          source venv/bin/activate
          
          # 安装/更新依赖（使用缓存）
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # 收集静态文件
          python manage.py collectstatic --noinput
          
          # 执行数据库迁移
          python manage.py migrate --noinput
          
          # 检查并启动 Redis 服务
          echo "Checking Redis service..."
          if ! systemctl is-active --quiet redis-server; then
            echo "Redis is not running, attempting to start..."
            sudo systemctl start redis-server
            sudo systemctl enable redis-server
          fi
          
          # 验证 Redis 连接
          if redis-cli ping | grep -q "PONG"; then
            echo "✅ Redis is running and responding"
          else
            echo "❌ Redis is not responding properly"
            exit 1
          fi
          
          # 重启所有服务
          echo "Restarting services..."
          sudo systemctl restart drf_vue_backend
          sudo systemctl restart drf_vue_celery_worker
          sudo systemctl restart drf_vue_celery_beat
          
          # 启用服务开机自启
          sudo systemctl enable drf_vue_backend
          sudo systemctl enable drf_vue_celery_worker
          sudo systemctl enable drf_vue_celery_beat
          
          # 等待服务启动
          sleep 5
          
          # 健康检查
          echo "=== Health Check ==="
          if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/ | grep -q "200\|401\|403"; then
            echo "✅ Backend is healthy"
          else
            echo "❌ Backend health check failed"
            sudo systemctl status drf_vue_backend --no-pager
            exit 1
          fi
          
          # 检查服务状态
          echo "=== Service Status ==="
          sudo systemctl status drf_vue_backend --no-pager -l
          sudo systemctl status drf_vue_celery_worker --no-pager -l
          sudo systemctl status drf_vue_celery_beat --no-pager -l
        EOF
      
    - name: Deployment notification
      if: success()
      run: echo "✅ Backend deployment successful!"
    
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Backend deployment failed!"
