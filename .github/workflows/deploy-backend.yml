name: Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT }}
  BACKEND_PATH: /home/DRF_VUE/drf_vue/backend
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -p ${{ env.SERVER_PORT }} ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy backend to server
      run: |
        # 上传后端代码到服务器
        rsync -avz --delete \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='htmlcov' \
          --exclude='.coverage' \
          --exclude='venv' \
          --exclude='.env.development' \
          backend/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/
        
        # 在服务器上执行部署命令
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << EOF
          cd ${{ env.BACKEND_PATH }}
          
          PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          
          # 设置生产环境变量
          export DJANGO_ENV=production
          
          # 删除旧的虚拟环境并重新创建
          rm -rf venv
          python${PYTHON_VERSION} -m venv venv
          source venv/bin/activate
          
          # 安装依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # 收集静态文件
          python manage.py collectstatic --noinput
          
          # 执行数据库迁移
          python manage.py migrate --noinput
          
          # 重启 Gunicorn 服务
          sudo systemctl restart drf_vue_backend
          
          # 检查服务状态
          sudo systemctl status drf_vue_backend --no-pager
        EOF
      
    - name: Deployment notification
      if: success()
      run: echo "✅ Backend deployment successful!"
    
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Backend deployment failed!"
