name: Deploy Backend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - '.github/*.service'
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT }}
  BACKEND_PATH: /home/DRF_VUE/drf_vue/backend
  PYTHON_VERSION: '3.11'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -p ${{ env.SERVER_PORT }} ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy backend to server
      run: |
        # 上传后端代码到服务器
        rsync -avz --delete \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='.pytest_cache' \
          --exclude='htmlcov' \
          --exclude='.coverage' \
          --exclude='venv' \
          --exclude='.env.development' \
          --exclude='/media/' \
          --exclude='staticfiles' \
          --exclude='logs' \
          backend/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/
        
        # Upload systemd service files
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "mkdir -p ${{ env.BACKEND_PATH }}/.github"
        scp -P ${{ env.SERVER_PORT }} .github/gunicorn.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        scp -P ${{ env.SERVER_PORT }} .github/celery-worker.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        scp -P ${{ env.SERVER_PORT }} .github/celery-beat.service ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.BACKEND_PATH }}/.github/
        
        echo "✅ Service files uploaded successfully"
        
        # 在服务器上执行部署命令
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
          cd /home/DRF_VUE/drf_vue/backend
          
          # 设置生产环境变量
          export DJANGO_ENV=production
          
          # 确保 systemd 目录存在
          sudo mkdir -p /etc/systemd/system
          
          # 定义服务文件映射
          declare -A SERVICES=(
            ["gunicorn.service"]="drf_vue_backend.service"
            ["celery-worker.service"]="drf_vue_celery_worker.service"
            ["celery-beat.service"]="drf_vue_celery_beat.service"
          )
          
          SERVICES_CHANGED=false
          
          for src in "${!SERVICES[@]}"; do
            dest="/etc/systemd/system/${SERVICES[$src]}"
            src_path=".github/$src"
            
            if [ -f "$src_path" ]; then
              # 如果目标不存在，或内容不同，则复制
              if [ ! -f "$dest" ] || ! cmp -s "$src_path" "$dest"; then
                sudo cp "$src_path" "$dest"
                SERVICES_CHANGED=true
                echo "Updated: $src -> ${SERVICES[$src]}"
              else
                echo "Unchanged: $src"
              fi
            else
              echo "Warning: $src_path not found"
            fi
          done
          
          if [ "$SERVICES_CHANGED" = true ]; then
            sudo systemctl daemon-reload
            echo "Systemd daemon reloaded"
          fi
          
          # 检查虚拟环境是否存在
          if [ ! -d "venv" ]; then
            echo "Creating virtual environment..."
            python3.11 -m venv venv
          fi
          
          source venv/bin/activate
          
          # 安装/更新依赖
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # 收集静态文件
          python manage.py collectstatic --noinput
          
          # 执行数据库迁移
          python manage.py migrate --noinput
          
          # 检查并启动 Redis 服务
          echo "Checking Redis service..."
          if ! systemctl is-active --quiet redis-server && ! systemctl is-active --quiet redis; then
            echo "Redis is not running, attempting to start..."
            # 尝试不同的服务名
            if systemctl list-units --type=service | grep -q redis-server; then
              sudo systemctl start redis-server
              sudo systemctl enable redis-server
            elif systemctl list-units --type=service | grep -q redis; then
              sudo systemctl start redis
              sudo systemctl enable redis
            else
              echo "❌ Redis service not found"
              exit 1
            fi
          fi
          
          # 验证 Redis 连接
          if redis-cli ping | grep -q "PONG"; then
            echo "✅ Redis is running and responding"
          else
            echo "❌ Redis is not responding properly"
            exit 1
          fi
          
          # Restart all services
          echo "Restarting services..."
          
          # 重启 Gunicorn（关键服务，必须成功）
          if ! sudo systemctl restart drf_vue_backend; then
            echo "❌ Failed to restart Gunicorn"
            sudo journalctl -u drf_vue_backend --no-pager -n 30
            exit 1
          fi
          
          # 重启 Celery Worker（非关键，失败不中断部署）
          sudo systemctl restart drf_vue_celery_worker || echo "⚠️ Celery Worker restart failed (non-critical)"
          
          # 重启 Celery Beat（非关键，失败不中断部署）
          sudo systemctl restart drf_vue_celery_beat || echo "⚠️ Celery Beat restart failed (non-critical)"
          
          # Enable services on boot
          sudo systemctl enable drf_vue_backend
          sudo systemctl enable drf_vue_celery_worker
          sudo systemctl enable drf_vue_celery_beat
          
          # Wait for services to start
          sleep 5
          
          # Health check
          echo "=== Health Check ==="
          if systemctl is-active --quiet drf_vue_backend; then
            echo "✅ Gunicorn service is active"
          else
            echo "❌ Gunicorn service is not active"
            sudo journalctl -u drf_vue_backend --no-pager -n 20
            exit 1
          fi
          
          if systemctl is-active --quiet drf_vue_celery_worker; then
            echo "✅ Celery Worker service is active"
          else
            echo "⚠️ Celery Worker service is not active (non-critical)"
            sudo journalctl -u drf_vue_celery_worker --no-pager -n 20 || true
          fi
          
          if systemctl is-active --quiet drf_vue_celery_beat; then
            echo "✅ Celery Beat service is active"
          else
            echo "⚠️ Celery Beat service is not active (non-critical)"
            sudo journalctl -u drf_vue_celery_beat --no-pager -n 20 || true
          fi
          
          # Check if port is listening
          if ss -tlnp | grep -q ":8000"; then
            echo "✅ Port 8000 is listening"
          else
            echo "❌ Port 8000 is not listening"
            exit 1
          fi
          
          # Check service status
          echo "=== Service Status ==="
          sudo systemctl status drf_vue_backend --no-pager -l
          
          echo ""
          echo "🎉 Deployment completed successfully!"
        EOF
      
    - name: Deployment notification
      if: success()
      run: echo "✅ Backend deployment successful!"
    
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Backend deployment failed!"
