name: Deploy Frontend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - 'mobile/**'
      - 'front/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT }}
  FRONTEND_PATH: /home/front
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          frontend/node_modules
          mobile/node_modules
          front/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json', 'mobile/package-lock.json', 'front/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install all dependencies
      run: |
        npm ci --prefix frontend
        npm ci --prefix mobile
        npm ci --prefix front
    
    - name: Build all frontends
      run: |
        npm run build --prefix frontend
        npm run build --prefix mobile
        npm run build --prefix front
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -p ${{ env.SERVER_PORT }} ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy frontend to server
      run: |
        mkdir -p deploy_temp
        
        # 复制前端构建产物（检查目录是否存在）
        if [ -d "frontend/dist_backend" ]; then
          cp -r frontend/dist_backend deploy_temp/dist_backend
          echo "✅ Copied backend admin frontend"
        else
          echo "⚠️ frontend/dist_backend not found, skipping"
        fi
        
        if [ -d "mobile/dist_mobile" ]; then
          cp -r mobile/dist_mobile deploy_temp/dist_mobile
          echo "✅ Copied mobile frontend"
        else
          echo "⚠️ mobile/dist_mobile not found, skipping"
        fi
        
        if [ -d "front/dist" ]; then
          cp -r front/dist deploy_temp/dist
          echo "✅ Copied PC frontend"
        else
          echo "❌ front/dist not found!"
          exit 1
        fi
        
        # 上传到服务器
        rsync -avz --delete \
          deploy_temp/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.FRONTEND_PATH }}/
        
        # 清理临时目录
        rm -rf deploy_temp
        
        # 在服务器上执行部署命令
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
          cd /home/front
          
          # 设置正确的权限
          sudo chown -R www-data:www-data dist dist_mobile dist_backend
          sudo chmod -R 755 dist dist_mobile dist_backend
          
          # 检查 Nginx 状态
          sudo systemctl status nginx --no-pager
        EOF
    
    - name: Deployment notification
      if: success()
      run: echo "✅ Frontend deployment successful!"
    
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Frontend deployment failed!"
