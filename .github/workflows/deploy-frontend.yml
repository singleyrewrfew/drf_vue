name: Deploy Frontend

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - 'mobile/**'
      - 'front/**'
      - '.github/workflows/deploy-frontend.yml'
      - '.github/nginx.conf'
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  SERVER_PORT: ${{ secrets.SERVER_PORT }}
  FRONTEND_PATH: /home/front
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Cache npm dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          frontend/node_modules
          mobile/node_modules
          front/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json', 'mobile/package-lock.json', 'front/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install all dependencies
      run: |
        npm ci --prefix frontend
        npm ci --prefix mobile
        npm ci --prefix front
    
    - name: Build all frontends
      run: |
        npm run build --prefix frontend
        npm run build --prefix mobile
        npm run build --prefix front
    
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H -p ${{ env.SERVER_PORT }} ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
    
    - name: Deploy frontend to server
      run: |
        mkdir -p deploy_temp
        
        cp -r frontend/dist_backend deploy_temp/dist_backend
        cp -r mobile/dist_mobile deploy_temp/dist_mobile
        cp -r front/dist deploy_temp/dist
        
        # 上传到服务器
        rsync -avz --delete \
          deploy_temp/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.FRONTEND_PATH }}/
        
        # 上传 nginx 配置
        scp -P ${{ env.SERVER_PORT }} .github/nginx.conf ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/tmp/nginx.conf
        
        # 清理临时目录
        rm -rf deploy_temp
        
        # 在服务器上执行部署命令
        ssh -p ${{ env.SERVER_PORT }} ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'EOF'
          cd /home/front
          
          # 设置正确的权限
          sudo chown -R www-data:www-data dist dist_mobile dist_backend
          sudo chmod -R 755 dist dist_mobile dist_backend
          
          # 检查并更新 Nginx 配置（仅在变化时）
          if ! cmp -s /tmp/nginx.conf /etc/nginx/nginx.conf 2>/dev/null; then
            echo "Nginx config changed, updating..."
            sudo cp /tmp/nginx.conf /etc/nginx/nginx.conf
            if sudo nginx -t; then
              sudo systemctl reload nginx
              echo "✅ Nginx config updated and reloaded"
            else
              echo "❌ Nginx config test failed, keeping old config"
              sudo cp /etc/nginx/nginx.conf /tmp/nginx.conf.bak
              exit 1
            fi
          else
            echo "Nginx config unchanged, skipping update"
          fi
          rm -f /tmp/nginx.conf
          
          # 重启 Nginx
          sudo systemctl restart nginx
          
          # 检查 Nginx 状态
          sudo systemctl status nginx --no-pager
        EOF
    
    - name: Deployment notification
      if: success()
      run: echo "✅ Frontend deployment successful!"
    
    - name: Deployment failure notification
      if: failure()
      run: echo "❌ Frontend deployment failed!"
