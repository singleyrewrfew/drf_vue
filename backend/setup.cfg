[flake8]
max-line-length = 120
exclude = migrations,venv,.venv,__pycache__,node_modules
extend-ignore = E203,W503

[isort]
profile = black
multi_line_output = 3
skip = migrations,venv,.venv

[tool:mypy]
plugins = mypy_django_plugin.main
ignore_missing_imports = true
exclude = migrations/

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
