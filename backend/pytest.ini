# ==============================================================================
# Pytest 测试框架配置文件
# ==============================================================================
# 
# 作用：定义项目运行测试时的行为规则和配置参数
# 使用：在 backend 目录下执行 pytest 命令自动加载此配置
#
# 主要功能：
#   1. Django 环境集成 - 自动加载 Django 设置模块
#   2. 测试发现规则 - 自动识别符合命名规范的测试文件和方法
#   3. 运行选项配置 - 统一测试输出格式和执行参数
#   4. 测试标记系统 - 支持分类执行不同类型的测试
#
# 常用命令示例：
#   pytest                          # 运行所有测试
#   pytest -m unit                  # 只运行单元测试
#   pytest -m "not slow"           # 跳过慢速测试
#   pytest --cov=apps              # 生成覆盖率报告
# ==============================================================================

[pytest]

# --------------------------------------------------------------------------
# Django 集成配置
# --------------------------------------------------------------------------
# 指定 Django 的设置模块路径，使 pytest 能够正确初始化 Django 环境
# 这是运行 Django 测试的必要配置
DJANGO_SETTINGS_MODULE = config.settings

# --------------------------------------------------------------------------
# 测试发现规则
# --------------------------------------------------------------------------
# 定义 pytest 自动识别测试文件的命名模式
# 只有符合以下规则的文件和函数才会被识别为测试

# 测试文件命名模式：以 test_ 开头的 Python 文件
python_files = test_*.py

# 测试类命名模式：以 Test 开头的类
test_classes = Test*

# 测试函数命名模式：以 test_ 开头的函数或方法
python_functions = test_*

# --------------------------------------------------------------------------
# 默认运行选项
# --------------------------------------------------------------------------
# 每次运行 pytest 时自动附加的命令行参数
# 这些选项会应用到所有测试执行中
addopts = 
    # 显示详细的测试执行过程和结果
    --verbose
    # 使用简短的回溯信息（失败时只显示关键错误位置）
    --tb=short
    # 严格检查标记，未注册的标记会报错（防止拼写错误）
    --strict-markers
    # 禁用警告信息（保持输出简洁）
    --disable-warnings

# --------------------------------------------------------------------------
# 测试目录配置
# --------------------------------------------------------------------------
# 指定测试文件存放的根目录
# pytest 会在此目录下递归搜索所有测试文件
testpaths = tests

# --------------------------------------------------------------------------
# 自定义测试标记
# --------------------------------------------------------------------------
# 定义项目中可用的测试标记类型，用于分类和组织测试
# 使用方法：在测试函数上添加 @pytest.mark.<标记名>
#
# 标记说明：
#   unit        - 单元测试：测试单个函数或方法的独立功能
#   integration - 集成测试：测试多个组件之间的协作
#   slow        - 慢速测试：执行时间较长的测试（可选择性跳过）
#
# 使用示例：
#   @pytest.mark.unit
#   def test_create_content():
#       ...
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
