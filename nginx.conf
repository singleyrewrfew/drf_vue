user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;


events {
	worker_connections 1024;
	multi_accept on;
	use epoll;
}


http {


	##
	# Basic Settings
	##


	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	keepalive_requests 100;
	client_body_timeout 10s;
	client_header_timeout 10s;
	send_timeout 10s;
	
	# 字符集配置
	charset utf-8;
	
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;
	
	# MIME 类型映射
	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	##
	# SSL Settings
	##


	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;


	##
	# Logging Settings
	##


	access_log /var/log/nginx/access.log;


	##
	# Gzip Settings
	##


	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_buffers 16 8k;
	gzip_http_version 1.1;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;


	##
	# Virtual Host Configs
	##
	# 加载自定义配置文件（按域名拆分配置，更易维护)
	include /etc/nginx/conf.d/*.conf;
	# 加载启用的站点配置（Debian/Ubuntu 特有）
	include /etc/nginx/sites-enabled/*;
	
	# ===================== 缓存配置（静态文件） =====================
	# 开启文件缓存（提升静态文件访问速度）
	open_file_cache max=10000 inactive=30s;
	open_file_cache_valid 60s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;
	
	upstream cms_backend {
		server 127.0.0.1:8000 fail_timeout=0;
	}
	
	
	# ===================== 移动端检测 =====================
	# 使用 map 指令检测移动设备
	map $http_user_agent $is_mobile {
		default 0;
		"~*Mobile" 1;
		"~*Android" 1;
		"~*iPhone" 1;
		"~*iPad" 1;
		"~*iPod" 1;
		"~*BlackBerry" 1;
		"~*IEMobile" 1;
		"~*Opera Mini" 1;
		"~*webOS" 1;
		"~*SymbianOS" 1;
		"~*Windows Phone" 1;
	}
	
	
	# 定义移动端和 PC 端的根路径变量（推荐写法）
	map $is_mobile $frontend_root {
		1 /home/front/dist_mobile;
		0 /home/front/dist;
	}
		
	
	server {
		listen 80;
		server_name 8.148.251.135;

		# ===================== 上传大小限制 =====================
		# 客户端最大上传大小（视频文件可能很大，设置为 500M）
		client_max_body_size 500M;
		
		# 前端静态文件
		root /home/front/dist;
		index index.html;
		
		
		
		# ===================== API 反向代理到后端 =====================
		location /api/ {
			proxy_pass http://cms_backend;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_redirect off;
			
			# 超时设置（支持大文件上传，增加超时时间）
			proxy_connect_timeout 300s;
			proxy_send_timeout 300s;
			proxy_read_timeout 300s;
			
			# 支持大文件上传（必须设置，与全局配置一致）
			client_max_body_size 500M;
		}
		
		# ===================== SSE（Server-Sent Events）配置 =====================
		location ~ ^/api/media/[^/]+/thumbnail_status/ {
			proxy_pass http://cms_backend;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_redirect off;
			
			# SSE 必需配置
			proxy_buffering off;
			proxy_cache off;
			gzip off;
			
			# 长连接超时（缩略图生成可能需要较长时间）
			proxy_read_timeout 600s;
			proxy_connect_timeout 60s;
			proxy_send_timeout 60s;
			
			# HTTP 1.1 支持
			proxy_http_version 1.1;
			proxy_set_header Connection '';
		}
		
		# ===================== 媒体文件代理 =====================
		location /media/ {
			alias /home/DRF_VUE/drf_vue/backend/media/;
			expires 30d;
			add_header Cache-Control "public, immutable";
			
			# 支持大文件
			client_max_body_size 500M;
		}


		# ===================== 静态文件 =====================
		location /static/ {
			alias /home/DRF_VUE/drf_vue/backend/staticfiles/;
			expires 30d;
			add_header Cache-Control "public, immutable";
		}
		
		# ===================== 后台管理界面（/admin 路径） =====================
		location ^~ /admin/ {
			alias /home/front/dist_backend/;
			try_files $uri $uri/ /admin/index.html;
		}


		# ===================== 前端静态文件（PC 端/移动端自动分发） =====================
		# 前台界面（优先匹配静态文件，没有则转发到 index.html）
		location / {
			root $frontend_root;
			index index.html;
			# 关键：所有不存在的路径都转发到 index.html，由前端路由处理
			try_files $uri $uri/ /index.html;
		}
	}

}
