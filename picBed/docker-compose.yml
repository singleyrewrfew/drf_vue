version: '3.8'

services:
  web:
    build: .
    container_name: picbed_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=postgres://picbed:picbed@db:5432/picbed
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-20971520}
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - static_volume:/app/static
    depends_on:
      - db
      - redis
    networks:
      - picbed_network

  celery_worker:
    build: .
    container_name: picbed_celery_worker
    restart: always
    command: celery -A picBed worker -l INFO
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://picbed:picbed@db:5432/picbed
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-20971520}
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - picbed_network

  celery_beat:
    build: .
    container_name: picbed_celery_beat
    restart: always
    command: celery -A picBed beat -l INFO
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgres://picbed:picbed@db:5432/picbed
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - picbed_network

  db:
    image: postgres:15-alpine
    container_name: picbed_db
    restart: always
    environment:
      - POSTGRES_DB=picbed
      - POSTGRES_USER=picbed
      - POSTGRES_PASSWORD=picbed
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - picbed_network

  redis:
    image: redis:7-alpine
    container_name: picbed_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - picbed_network

  nginx:
    image: nginx:alpine
    container_name: picbed_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/app/media:ro
      - static_volume:/app/static:ro
    depends_on:
      - web
    networks:
      - picbed_network

volumes:
  postgres_data:
  redis_data:
  static_volume:

networks:
  picbed_network:
    driver: bridge
